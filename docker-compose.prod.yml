version: '3.8'


services:

  nginx:
    image: ghcr.io/mrmegatelo/walter-nginx:${GITHUB_SHA:-latest}
    volumes:
      - staticfiles:/app/staticfiles
      - mediafiles:/app/mediafiles
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.thewalter-static.rule=Host(`thewalter.app`) && (PathPrefix(`/static/`) || PathPrefix(`/media/`))"
      - "traefik.http.routers.thewalter-static.entrypoints=websecure"
      - "traefik.http.routers.thewalter-static.tls.certresolver=letsencrypt"
      - "traefik.http.routers.thewalter-static.priority=100"
      - "traefik.http.services.thewalter-static.loadbalancer.server.port=80"
    depends_on:
      - web
      - flower

  web:
    image: ghcr.io/mrmegatelo/walter-django:${GITHUB_SHA:-latest}
    command: /start
    volumes:
      - ./frontend/static:/app/frontend/static
      - staticfiles:/app/staticfiles
      - mediafiles:/app/mediafiles
    env_file:
      - .env
    environment:
      DOCKER: true
    depends_on:
      frontend:
        condition: service_completed_successfully
      redis:
        condition: service_started
      db:
        condition: service_started
    networks:
      - internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.thewalter.rule=Host(`thewalter.app`)"
      - "traefik.http.routers.thewalter.entrypoints=websecure"
      - "traefik.http.routers.thewalter.tls.certresolver=letsencrypt"
      - "traefik.http.services.thewalter.loadbalancer.server.port=8000"

  frontend:
    image: ghcr.io/mrmegatelo/walter-frontend:${GITHUB_SHA:-latest}
    command: build
    volumes:
      - ./frontend/static:/app/static
      - /app/node_modules

  db:
    image: postgres:16-alpine
    networks:
      - internal

  redis:
    image: redis:7-alpine
    networks:
      - internal

  celery_worker:
    image: ghcr.io/mrmegatelo/walter-django:${GITHUB_SHA:-latest}
    command: /start-celeryworker
    volumes:
      - staticfiles:/app/staticfiles
      - mediafiles:/app/mediafiles
    env_file:
      - .env
    depends_on:
      - redis
      - db
    networks:
      - internal

  celery_beat:
    image: ghcr.io/mrmegatelo/walter-django:${GITHUB_SHA:-latest}
    command: /start-celerybeat
    volumes:
      - staticfiles:/app/staticfiles
      - mediafiles:/app/mediafiles
    env_file:
      - .env
    depends_on:
      - redis
      - db
    networks:
      - internal

  flower:
    image: ghcr.io/mrmegatelo/walter-django:${GITHUB_SHA:-latest}
    command: /start-flower
    volumes:
      - staticfiles:/app/staticfiles
      - mediafiles:/app/mediafiles
      - flower_db:/app/flower_db
    env_file:
      - .env
    depends_on:
      - redis
      - db
    networks:
      - internal

networks:
  internal:
  traefik-public:
    external: true

volumes:
  postgres_data:
  staticfiles:
  mediafiles:
  flower_db: